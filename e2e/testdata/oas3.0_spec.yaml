# OpenAPI 3.0.3 specification — Blogs Platform API
# Covers CRUD operations for blog posts, comments, attachments, and search.
openapi: "3.0.3"
info:
  title: Blogs Platform API
  version: 1.0.0
  description: |
    Blogs Platform REST API — simplified subset for MCP tool generation.

    ## Overview

    This spec models a minimal blogging platform supporting:

    - **Reading** posts and metadata
    - **Creating** new posts
    - **Updating** existing post content
    - **Deleting** posts and attachments
    - **Searching** posts by keyword
    - **Commenting** on posts
    - **Uploading** attachments
    - **Managing** tags/labels

    ## Authentication

    All requests require a Bearer token:

    ```
    Authorization: Bearer <api_token>
    ```

servers:
  - url: https://{domain}/api/v1
    variables:
      domain:
        default: api.blogs.example.com
        description: "Blogs platform domain"

paths:
  /posts:
    get:
      operationId: listPosts
      summary: List all posts accessible to the authenticated user
      description: |
        Lists posts the authenticated user can access.

        ## Response

        The response is a paginated result.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 200
            default: 25
        - name: start
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: status
          in: query
          description: Filter by post status
          schema:
            type: string
            enum: [draft, published, archived]
      responses:
        "200":
          description: Paginated list of posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
                  start:
                    type: integer
                    format: int32
                  limit:
                    type: integer
                    format: int32
                  size:
                    type: integer
                    format: int32
    post:
      operationId: createPost
      summary: |
        Create a new blog post.
      description: Creates a new post in the specified blog.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'

  /posts/{id}:
    get:
      operationId: getPost
      summary: Get a blog post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: The requested post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
    put:
      operationId: updatePost
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
    delete:
      operationId: deletePost
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Post deleted

  /posts/{id}/body:
    put:
      operationId: updatePostBody
      summary: Update only the body content of a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  description: New body content (markdown)
      responses:
        "200":
          description: Body updated

  /attachments/upload:
    post:
      operationId: uploadAttachment
      summary: Upload an attachment file
      description: Uploads a file as an attachment to a blog post.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                postId:
                  type: integer
                  description: ID of the post to attach to
                comment:
                  type: string
                  description: Optional comment for the attachment
      responses:
        "200":
          description: Attachment uploaded successfully

  /attachments/{id}:
    get:
      operationId: downloadAttachment
      summary: Download an attachment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: The attachment file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /comments:
    post:
      operationId: createComment
      summary: Create a comment on a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postId, body]
              properties:
                postId:
                  type: integer
                parentId:
                  type: integer
                  description: ID of the parent comment (for replies)
                body:
                  type: string
      responses:
        "201":
          description: Comment created

  /posts/{id}/tags:
    post:
      operationId: addTags
      summary: Add tags to a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
      responses:
        "200":
          description: Tags added

  /posts/{id}/tags/{tagId}:
    delete:
      operationId: removeTag
      summary: Remove a tag from a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: tagId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Tag removed

  /search:
    get:
      operationId: searchPosts
      summary: Search blog posts by keyword
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 50
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
                  totalSize:
                    type: integer

  /posts/{id}/metadata:
    get:
      operationId: getPostMetadata
      summary: Get metadata for a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Post metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMetadata'

components:
  schemas:
    Post:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        author:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PostCreate:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
        status:
          type: string
          enum: [draft, published]
        tags:
          type: array
          items:
            type: string

    PostUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
        status:
          type: string
          enum: [draft, published, archived]

    PostMetadata:
      type: object
      properties:
        postId:
          type: integer
          format: int64
        viewCount:
          type: integer
        likeCount:
          type: integer
        lastCommentedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
