          maxContains: 200
          contains:
            type: object
            properties:
              id:
                type: integer
        start:
          type: integer
        limit:
          type: integer
        _links:
          type: object
          unevaluatedProperties: false
          properties:
            self:
              type: string
            base:
              type: ["string", "null"]

    Space:
